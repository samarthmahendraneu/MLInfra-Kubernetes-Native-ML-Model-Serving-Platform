name: Production Blue-Green Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            PROJECT_ROOT="$HOME/mlops_git"
            REPO_URL="https://github.com/samarthmahendraneu/MLInfra-Kubernetes-Native-ML-Model-Serving-Platform.git"

            # STEP 1: Sync Code
            if [ ! -d "$PROJECT_ROOT" ]; then
              git clone $REPO_URL $PROJECT_ROOT
            else
              cd $PROJECT_ROOT
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            fi

            cd $PROJECT_ROOT/ml-serving

            # STEP 2: Model Export
            python3 -m venv venv
            source venv/bin/activate
            pip install torch transformers onnx onnxscript onnxruntime onnxruntime-gpu
            python3 export.py
            mkdir -p model_repository/distilbert/1/
            mv model.onnx model_repository/distilbert/1/model.onnx
            deactivate

            # STEP 3: Blue-Green Logic
            # We check for the project-prefixed container names
            if docker ps --format '{{.Names}}' | grep -q "blue_api"; then
              TARGET="green"
              OLD="blue"
              T_PORT=9001
              T_TRITON=8001
            else
              TARGET="blue"
              OLD="green"
              T_PORT=9000
              T_TRITON=8000
            fi

            echo "🚀 Target: $TARGET | API: $T_PORT | Triton: $T_TRITON"

            # STEP 4: Force Cleanup of Target
            # This kills any ghost containers on the target ports before we build
            docker-compose -p $TARGET down --remove-orphans || true

            # STEP 5: Deploy
            # We pass the ports directly to the env of the command
            export API_PORT=$T_PORT
            export TRITON_PORT=$T_TRITON
            docker-compose -p $TARGET up -d --build

            # STEP 6: Wait (Overlap)
            echo "🕒 $TARGET is up. Waiting 10 minutes..."
            sleep 600

            # STEP 7: Shutdown Old
            docker-compose -p $OLD down --remove-orphans || echo "⚠️ $OLD stack not running."

            # STEP 8: Disk Cleanup
            docker system prune -f