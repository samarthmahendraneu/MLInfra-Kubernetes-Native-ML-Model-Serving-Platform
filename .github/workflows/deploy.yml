name: Production Blue-Green Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Exit on any command failure
            set -e

            # Project Configuration
            PROJECT_ROOT="$HOME/mlops_git"
            REPO_URL="https://github.com/samarthmahendraneu/MLInfra-Kubernetes-Native-ML-Model-Serving-Platform.git"

            # STEP 1: Sync Code (Hard Reset to match GitHub perfectly)
            if [ ! -d "$PROJECT_ROOT" ]; then
              echo "📂 First time setup. Cloning..."
              git clone $REPO_URL $PROJECT_ROOT
              cd $PROJECT_ROOT
            else
              echo "🔄 Force Syncing with GitHub main..."
              cd $PROJECT_ROOT
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            fi

            # Enter the serving directory
            cd ml-serving

            # STEP 2: Python Environment & Model Export
            echo "🐍 Building Python environment..."
            # Clean old venv to avoid disk bloat and dependency conflicts
            rm -rf venv
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install torch transformers onnx onnxscript onnxruntime onnxruntime-gpu
            
            echo "📦 Running ONNX Export..."
            python3 export.py
            
            echo "🚚 Moving model to Triton repository..."
            mkdir -p model_repository/distilbert/1/
            if [ -f "model.onnx" ]; then
                mv model.onnx model_repository/distilbert/1/model.onnx
                echo "✅ Model successfully placed."
            else
                echo "❌ Export failed: model.onnx not found."
                exit 1
            fi
            deactivate

            # STEP 3: Blue-Green Stack Selection
            # Identify which color is currently "Live"
            if docker ps --format '{{.Names}}' | grep -q "blue_api"; then
              TARGET="green"
              OLD="blue"
              T_PORT=9001
              T_TRITON=8001
            else
              TARGET="blue"
              OLD="green"
              T_PORT=9000
              T_TRITON=8000
            fi

            echo "🚀 Target Stack: $TARGET (API: $T_PORT, Triton: $T_TRITON)"

            # STEP 4: PORT SNIPER (Critical Edge Case Fix)
            # Find and kill ANY container (zombie) already using our target ports
            echo "🎯 Sniping any zombies on ports $T_PORT and $T_TRITON..."
            ZOMBIE_TRITON=$(docker ps -q --filter "publish=$T_TRITON")
            ZOMBIE_API=$(docker ps -q --filter "publish=$T_PORT")
            
            if [ ! -z "$ZOMBIE_TRITON" ]; then 
              echo "⚠️ Killing zombie Triton on $T_TRITON"
              docker rm -f $ZOMBIE_TRITON
            fi
            if [ ! -z "$ZOMBIE_API" ]; then 
              echo "⚠️ Killing zombie API on $T_PORT"
              docker rm -f $ZOMBIE_API
            fi

            # STEP 5: Launch Target Stack
            # We export these so Docker Compose can read the variables in the YAML
            export API_PORT=$T_PORT
            export TRITON_PORT=$T_TRITON
            
            echo "🆙 Bringing up $TARGET stack..."
            docker-compose -p $TARGET up -d --build

            # STEP 6: Traffic Overlap (Blue-Green Window)
            echo "🕒 $TARGET is live. Waiting 10 minutes for traffic overlap..."
            sleep 600

            # STEP 7: Shutdown Old Stack
            echo "🧹 Removing OLD stack: $OLD"
            docker-compose -p $OLD down --remove-orphans || echo "⚠️ $OLD stack not running."

            # STEP 8: Maintenance
            echo "💿 Pruning Docker to keep disk usage below 85%..."
            docker system prune -f

            echo "✅ Blue-Green Deployment Successful!"
