name: Production Blue-Green Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Exit on any error
            set -e

            # Project Variables
            PROJECT_ROOT="$HOME/mlops_git"
            REPO_URL="https://github.com/samarthmahendraneu/MLInfra-Kubernetes-Native-ML-Model-Serving-Platform.git"

            # 1. Code Sync (Clone vs Pull)
            if [ ! -d "$PROJECT_ROOT" ]; then
              echo "📂 First time setup. Cloning..."
              git clone $REPO_URL $PROJECT_ROOT
            else
              echo "🔄 Updating existing code..."
              cd $PROJECT_ROOT
              git pull origin main
            fi

            cd $PROJECT_ROOT/ml-serving

            # 2. Python Environment & Model Export
            echo "🐍 Building Python environment..."
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            # Added onnxscript/runtime to fix previous ModuleNotFoundErrors
            pip install torch transformers onnx onnxscript onnxruntime onnxruntime-gpu
            
            echo "📦 Running ONNX Export..."
            python3 export.py
            
            echo "🚚 Moving model to Triton repository..."
            mkdir -p model_repository/distilbert/1/
            if [ -f "model.onnx" ]; then
                mv model.onnx model_repository/distilbert/1/model.onnx
                echo "✅ Model successfully placed in Triton path."
            else
                echo "❌ Export failed: model.onnx not found."
                exit 1
            fi
            deactivate

            # 3. Smart Stack Selection
            # Check if 'blue' stack is currently up
            if docker ps --format '{{.Names}}' | grep -q "blue_api"; then
              TARGET="green"
              OLD="blue"
              T_PORT=9001
              T_TRITON=8001
            else
              TARGET="blue"
              OLD="green"
              T_PORT=9000
              T_TRITON=8000
            fi

            echo "🚀 Deploying to TARGET stack: $TARGET (Port $T_PORT)"

            # 4. Edge Case: Clean up any dead/orphan containers for this color
            # This prevents "Name already in use" errors from previous failed runs
            docker-compose -p $TARGET down --remove-orphans || true

            # 5. Launch Target Stack
            # We pass ports as env vars so docker-compose.yml can pick them up
            API_PORT=$T_PORT TRITON_PORT=$T_TRITON docker-compose -p $TARGET up -d --build

            # 6. Deployment Overlap (The "Blue-Green" Window)
            echo "🕒 $TARGET is live on Port $T_PORT."
            echo "🕒 Waiting 10 minutes for traffic overlap and cooling..."
            sleep 600

            # 7. Shutdown Old Stack
            echo "🧹 Removing OLD stack: $OLD"
            docker-compose -p $OLD down --remove-orphans || echo "⚠️ $OLD stack not running."

            # 8. Disk Space Maintenance (Crucial for 85% disk usage issues)
            echo "💿 Cleaning up old Docker images/cache..."
            docker system prune -f

            echo "✅ Blue-Green Deployment Complete!"