version: "3.8"

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.03-py3
    # ❌ Removed container_name to prevent naming collisions
    ports:
      - "${TRITON_PORT:-8000}:8000"
    volumes:
      - ./model_repository:/models
    command: tritonserver --model-repository=/models

  api:
    build:
      context: ./ml-serving # This assumes docker-compose is inside ml-serving/
      dockerfile: Dockerfile
    # ❌ Removed container_name
    ports:
      - "${API_PORT:-9000}:9000"
    environment:
      # Use the service name "triton"; Docker handles internal networking per project
      - TRITON_URL=http://triton:8000
    depends_on:
      - triton